<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bloco de Notas com Ditado (PWA)</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect rx="64" width="512" height="512" fill="%230b5cff"/><g transform="translate(64,64)" fill="%23fff"><rect x="0" y="0" width="384" height="48" rx="8"/><rect x="0" y="72" width="384" height="240" rx="12"/><rect x="0" y="336" width="384" height="48" rx="8"/><circle cx="320" cy="264" r="28" fill="%230b5cff"/></g></svg>'>
<meta name="theme-color" content="#0b5cff">
<style>
  :root{--controls-height:60px;--notes-panel-width:360px;--font-size:22px;}
  html,body{height:100%;margin:0;font-family:Arial, Helvetica, sans-serif;background:#f6f7f9;color:#111;overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100vh;box-sizing:border-box;}
  #controls{height:var(--controls-height);display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid #e6e6e6;background:#fff;box-sizing:border-box;}
  .controls-left{display:flex;gap:8px;align-items:center;} .controls-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
  button{padding:8px 12px;font-size:15px;border-radius:6px;border:1px solid #cfcfcf;background:#fff;cursor:pointer;}
  button.primary{background:#0b5cff;color:#fff;border-color:#0b5cff;} button.warn{background:#111;color:#fff;border-color:#111;}
  #fontControls{display:flex;align-items:center;gap:6px;} input[type="range"]{width:120px;}
  #main{display:flex;flex:1 1 auto;min-height:0;} #editor{flex:1 1 auto;display:flex;flex-direction:column;padding:12px;box-sizing:border-box;min-width:0;}
  #output{width:100%;flex:1 1 auto;font-size:var(--font-size);line-height:1.45;padding:18px;box-sizing:border-box;border:2px solid #ddd;border-radius:8px;resize:none;outline:none;background:#fff;color:#111;overflow:auto;white-space:pre-wrap;font-family: Arial, Helvetica, sans-serif;}
  #notesPanel{width:0;transition:width .18s ease;overflow:hidden;border-left:1px solid #e6e6e6;background:#fff;display:flex;flex-direction:column;}
  #notesPanel.open{width:var(--notes-panel-width);} #notesHeader{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #eee;}
  #notesList{padding:12px;overflow:auto;flex:1 1 auto;} .note{padding:10px;border:1px solid #eee;border-radius:6px;margin-bottom:10px;font-size:14px;white-space:pre-wrap;position:relative;}
  .note .meta{display:block;color:#666;margin-top:8px;font-size:12px;} .note .actions{position:absolute;top:8px;right:8px;display:flex;gap:6px;} .small{font-size:13px;color:#666;}
  #status{font-size:13px;color:#666;margin-left:12px;} @media (max-width:800px){ #notesPanel.open{width:100%;position:absolute;left:0;top:var(--controls-height);height:calc(100vh - var(--controls-height));z-index:2147483647;} }
  #dictateOverlay{position:fixed;left:12px;right:12px;bottom:12px;height:56px;display:flex;align-items:center;justify-content:center;padding:8px 12px;box-sizing:border-box;background:linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.55));color:#fff;z-index:2147483650;transform:translateY(110%);transition:transform .14s ease, opacity .14s ease;opacity:0;pointer-events:none;font-family: Arial, Helvetica, sans-serif;border-radius:10px;}
  #dictateOverlay.open{transform:translateY(0%); opacity:1; pointer-events:auto;}
  #dictateOverlay .text{font-size:16px;line-height:1.2;max-width:calc(100% - 120px);text-align:left;word-break:break-word;overflow:auto;white-space:nowrap;}
  #dictateOverlay .hint{position:absolute;left:14px;bottom:6px;font-size:12px;color:rgba(255,255,255,0.85);}
  #dictateOverlay .spinner{position:absolute;right:14px;bottom:6px;width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);border-top-color: #fff;animation:spin 1s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}} .toggle {display:inline-flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;border:1px solid #ddd;background:#fff;} .toggle input{transform:scale(1.1);}
  #toast {position: fixed;left: 50%;top: 50%;transform: translate(-50%, -50%) scale(0.98);background: rgba(0,0,0,0.85);color: #fff;padding: 12px 18px;border-radius: 10px;font-size: 16px;z-index: 999999;opacity: 0;pointer-events: none;transition: opacity 160ms ease, transform 160ms ease;box-shadow: 0 6px 18px rgba(0,0,0,0.35);font-family: Arial, Helvetica, sans-serif;display: none;}
  #toast.show {opacity: 1;transform: translate(-50%, -50%) scale(1);pointer-events: auto;}
</style>
</head>
<body>
<div id="app" role="application">
  <div id="controls" role="toolbar" aria-label="Controles do ditado">
    <div class="controls-left">
      <button id="micBtn" class="primary" title="Esc para alternar">🎤 Iniciar (Esc)</button>
      <button id="copyBtn" title="F4 para copiar">📋 Copiar (F4)</button>
      <button id="undoBtn" title="Ctrl+U">↩️ Desfazer (Ctrl+U)</button>
      <button id="redoBtn" title="Ctrl+Y">↪️ Refazer (Ctrl+Y)</button>
      <button id="newBtn" title="F9 para nova nota">📝 Nova Nota (F9)</button>
      <button id="clearBtn" class="warn" title="Ctrl+L">🧹 Limpar (Ctrl+L)</button>
      <div id="fontControls" aria-hidden="false">
        <label for="fontRange" class="small" style="margin-left:8px;">Tamanho</label>
        <button id="fontDec">A-</button>
        <input id="fontRange" type="range" min="14" max="40" value="22" />
        <button id="fontInc">A+</button>
      </div>
    </div>
    <div class="controls-right">
      <label class="toggle" title="Pontuação automática">
        <input type="checkbox" id="autoPunct" checked />
        <span>Pontuação automática</span>
      </label>
      <label class="toggle" title="Caixa alta para ditado">
        <input type="checkbox" id="allCaps" />
        <span>Caixa alta</span>
      </label>
      <button id="notesToggle" title="Ctrl+M">📚 Notas (Ctrl+M)</button>
      <div id="status" aria-live="polite">Pronto</div>
    </div>
  </div>

  <div id="main">
    <div id="editor">
      <textarea id="output" placeholder="Texto ditado aparecerá aqui..." aria-label="Área de ditado"></textarea>
    </div>

    <aside id="notesPanel" aria-hidden="true">
      <div id="notesHeader">
        <div style="font-weight:600">Notas salvas</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="deleteAllBtn" title="Ctrl+Shift+Delete">🗑️ Excluir todas</button>
          <button id="closeNotesBtn">Fechar</button>
        </div>
      </div>
      <div id="notesList" role="list" aria-label="Lista de notas"></div>
    </aside>
  </div>
</div>

<div id="dictateOverlay" aria-hidden="true">
  <div class="text" id="overlayText" aria-live="polite"></div>
  <div class="hint" id="overlayHint">Aguardando texto final</div>
  <div class="spinner" id="overlaySpinner" style="display:none"></div>
</div>

<div id="toast" role="status" aria-live="polite" aria-atomic="true">Copiado</div>

<script>
/* ====== Elementos e estado ====== */
const output = document.getElementById('output');
const micBtn = document.getElementById('micBtn');
const copyBtn = document.getElementById('copyBtn');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const newBtn = document.getElementById('newBtn');
const clearBtn = document.getElementById('clearBtn');
const notesToggle = document.getElementById('notesToggle');
const notesPanel = document.getElementById('notesPanel');
const notesList = document.getElementById('notesList');
const closeNotesBtn = document.getElementById('closeNotesBtn');
const deleteAllBtn = document.getElementById('deleteAllBtn');
const status = document.getElementById('status');
const fontRange = document.getElementById('fontRange');
const fontInc = document.getElementById('fontInc');
const fontDec = document.getElementById('fontDec');
const autoPunct = document.getElementById('autoPunct');
const allCaps = document.getElementById('allCaps');

const overlay = document.getElementById('dictateOverlay');
const overlayText = document.getElementById('overlayText');
const overlayHint = document.getElementById('overlayHint');
const overlaySpinner = document.getElementById('overlaySpinner');

const toastEl = document.getElementById('toast');

let saveTimer = null;
const autosaveDelay = 2000;
let history = [];
let redoStack = [];
let notes = [];
const STORAGE_KEY = 'ditado_notes_v3';
const HISTORY_LIMIT = 300;
let lastInterim = '';
let currentNoteIndex = null;
const MAX_NOTES = 500;

/* ====== Utilitários básicos ====== */
function nowLabel(ts){ return new Date(ts).toLocaleString(); }
function persistNotes(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
function loadNotes(){ try{ notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }catch(e){ notes = []; } renderNotes(); }
function renderNotes(){ notesList.innerHTML=''; if(notes.length===0){ notesList.innerHTML='<div class="small" style="padding:12px;color:#666">Nenhuma nota salva</div>'; return; } notes.forEach((n,idx)=>{ const el=document.createElement('div'); el.className='note'; el.dataset.idx=idx; const actions=document.createElement('div'); actions.className='actions'; const loadBtn=document.createElement('button'); loadBtn.title='Carregar nota'; loadBtn.textContent='Abrir'; const delBtn=document.createElement('button'); delBtn.title='Excluir nota'; delBtn.textContent='Excluir'; actions.appendChild(loadBtn); actions.appendChild(delBtn); el.appendChild(actions); const textNode=document.createElement('div'); textNode.textContent = n.text.length>800 ? n.text.slice(0,800)+'…' : n.text; el.appendChild(textNode); const meta=document.createElement('div'); meta.className='meta'; meta.textContent=nowLabel(n.t); el.appendChild(meta); loadBtn.addEventListener('click', ()=>{ loadNote(idx); closeNotes(); }); delBtn.addEventListener('click', ()=>{ if(!confirm('Excluir esta nota?')) return; if(currentNoteIndex!==null){ if(idx===currentNoteIndex){ currentNoteIndex=null; } else if(idx<currentNoteIndex){ currentNoteIndex=currentNoteIndex-1; } } notes.splice(idx,1); persistNotes(); renderNotes(); status.textContent='Nota excluída'; setTimeout(()=>status.textContent='Pronto',900); }); notesList.appendChild(el); }); }

/* ====== Salvamento automático ====== */
function scheduleAutoSave(){ clearTimeout(saveTimer); saveTimer = setTimeout(()=> saveCurrentAsNote(), autosaveDelay); }
function saveCurrentAsNote(){ const text = output.value.trim(); if(!text) return; if(currentNoteIndex!==null && notes[currentNoteIndex]){ if(notes[currentNoteIndex].text===text) return; notes[currentNoteIndex].text=text; notes[currentNoteIndex].t=Date.now(); persistNotes(); renderNotes(); status.textContent='Salvo'; setTimeout(()=>status.textContent='Pronto',900); return; } if(notes.length>0 && notes[0].text===text){ notes[0].t=Date.now(); persistNotes(); renderNotes(); currentNoteIndex=0; status.textContent='Salvo'; setTimeout(()=>status.textContent='Pronto',900); return; } notes.unshift({text,t:Date.now()}); if(notes.length>MAX_NOTES) notes.length=MAX_NOTES; persistNotes(); renderNotes(); currentNoteIndex=0; status.textContent='Salvo'; setTimeout(()=>status.textContent='Pronto',900); }

/* ====== Histórico ====== */
function pushHistory(value){ if(history.length && history[history.length-1]===value) return; history.push(value); if(history.length>HISTORY_LIMIT) history.shift(); redoStack=[]; }
function undo(){ if(history.length<=1) return; const cur=history.pop(); redoStack.push(cur); const prev=history[history.length-1]||''; output.value=prev; output.focus(); scheduleAutoSave(); status.textContent='Desfeito'; setTimeout(()=>status.textContent='Pronto',700); }
function redo(){ if(redoStack.length===0) return; const next=redoStack.pop(); output.value=next; pushHistory(next); output.focus(); scheduleAutoSave(); status.textContent='Refeito'; setTimeout(()=>status.textContent='Pronto',700); }

/* ====== Notas / UI helpers ====== */
function newNote(){ saveCurrentAsNote(); output.value=''; history=['']; redoStack=[]; currentNoteIndex=null; status.textContent='Nova nota'; setTimeout(()=>status.textContent='Pronto',700); }
function clearEditor(){ output.value=''; pushHistory(output.value); currentNoteIndex=null; status.textContent='Limpo'; setTimeout(()=>status.textContent='Pronto',700); }
function loadNote(idx){ const n=notes[idx]; if(!n) return; output.value=n.text; history=[n.text]; redoStack=[]; currentNoteIndex=idx; status.textContent='Nota carregada'; setTimeout(()=>status.textContent='Pronto',700); }
function deleteAllNotes(){ if(!notes.length) return; if(!confirm('Excluir todas as notas salvas?')) return; notes=[]; persistNotes(); renderNotes(); currentNoteIndex=null; status.textContent='Todas as notas excluídas'; setTimeout(()=>status.textContent='Pronto',900); }

/* ====== Copy / Toast ====== */
let __toastTimer=null;
function showToast(message='Copiado', ms=900){ if(!toastEl) return; toastEl.textContent=message; toastEl.style.display='block'; void toastEl.offsetWidth; toastEl.classList.add('show'); clearTimeout(__toastTimer); __toastTimer=setTimeout(()=>{ toastEl.classList.remove('show'); setTimeout(()=>{ toastEl.style.display='none'; },180); }, ms); }
async function copyAll(){ try{ const textToCopy = output.value || ''; if(!textToCopy){ showToast('Nada para copiar'); return; } if(navigator.clipboard && navigator.clipboard.writeText){ await navigator.clipboard.writeText(textToCopy); } else { output.select(); document.execCommand('copy'); try{ window.getSelection().removeAllRanges(); }catch(e){} } showToast('Copiado'); status.textContent='Copiado'; setTimeout(()=>status.textContent='Pronto',900); }catch(e){ console.error('Erro ao copiar:', e); showToast('Erro ao copiar'); alert('Falha ao copiar. Selecione e copie manualmente.'); } }

/* ====== Font controls ====== */
function setFontSize(px){ document.documentElement.style.setProperty('--font-size', px+'px'); fontRange.value=px; }
fontRange.addEventListener('input', ()=> setFontSize(fontRange.value));
fontInc.addEventListener('click', ()=> setFontSize(Math.min(40, Number(fontRange.value)+2)));
fontDec.addEventListener('click', ()=> setFontSize(Math.max(14, Number(fontRange.value)-2)));

/* ====== Pontuação falada, números e datas ====== */

const UNITS = {
  'zero':0,'um':1,'uma':1,'dois':2,'duas':2,'tres':3,'três':3,'quatro':4,'cinco':5,'seis':6,'sete':7,'oito':8,'nove':9,'dez':10,'onze':11,'doze':12,'treze':13,'catorze':14,'quatorze':14,'quinze':15,'dezesseis':16,'dezasseis':16,'dezessete':17,'dezassete':17,'dezoito':18,'dezenove':19
};
const TENS = {'vinte':20,'trinta':30,'quarenta':40,'cinquenta':50,'sessenta':60,'setenta':70,'oitenta':80,'noventa':90};
const HUNDREDS = {'cem':100,'cento':100,'duzentos':200,'trezentos':300,'quatrocentos':400,'quinhentos':500,'seiscentos':600,'setecentos':700,'oitocentos':800,'novecentos':900};
const MONTHS = {
  'janeiro': 1, 'fevereiro': 2, 'março': 3, 'marco': 3, 'abril': 4, 'maio': 5, 'junho': 6,
  'julho': 7, 'agosto': 8, 'setembro': 9, 'outubro': 10, 'novembro': 11, 'dezembro': 12
};

const PUNCT_PHRASES = [
  { words: ['ponto', 'e', 'vírgula'], symbol: ';' },
  { words: ['ponto', 'e', 'virgula'], symbol: ';' },
  { words: ['dois', 'pontos'], symbol: ':' },
  { words: ['ponto', 'final'], symbol: '.' },
  { words: ['ponto'], symbol: '.' },
  { words: ['vírgula'], symbol: ',' },
  { words: ['virgula'], symbol: ',' },
  { words: ['ponto', 'de', 'interrogação'], symbol: '?' },
  { words: ['ponto', 'de', 'interrogacao'], symbol: '?' },
  { words: ['ponto', 'de', 'exclamação'], symbol: '!' },
  { words: ['ponto', 'de', 'exclamacao'], symbol: '!' },
  { words: ['abre', 'parênteses'], symbol: '(' },
  { words: ['abre', 'parenteses'], symbol: '(' },
  { words: ['fecha', 'parênteses'], symbol: ')' },
  { words: ['fecha', 'parenteses'], symbol: ')' },
  { words: ['travessão'], symbol: '—' },
  { words: ['travessao'], symbol: '—' },
  { words: ['hífen'], symbol: '-' },
  { words: ['hifen'], symbol: '-' },
  { words: ['aspas'], symbol: '"' },
  { words: ['barra'], symbol: '/' },
  { words: ['barra', 'invertida'], symbol: '\\' }
];

function tryParseNumber(tokens, start) {
  let i = start;
  let total = 0;
  let currentGroup = 0;
  let foundAny = false;

  while (i < tokens.length) {
    const rawW = tokens[i];
    const w = rawW.toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');

    const numValue = parseInt(w, 10);
    if (!isNaN(numValue)) {
      currentGroup += numValue;
      foundAny = true;
      i++;
      continue;
    }

    if (UNITS[w] !== undefined) {
      currentGroup += UNITS[w];
      foundAny = true;
      i++;
      continue;
    }

    if (TENS[w] !== undefined) {
      currentGroup += TENS[w];
      foundAny = true;
      if (i + 2 < tokens.length && tokens[i+1].toLowerCase() === 'e') {
        const nextW = tokens[i+2].toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');
        if (UNITS[nextW] !== undefined) {
          currentGroup += UNITS[nextW];
          i += 3;
          continue;
        }
      }
      i++;
      continue;
    }

    if (HUNDREDS[w] !== undefined) {
      currentGroup += HUNDREDS[w];
      foundAny = true;
      if (i + 1 < tokens.length && tokens[i+1].toLowerCase() === 'e') {
        i += 2;
      } else {
        i++;
      }
      continue;
    }

    if (w === 'mil') {
      if (!foundAny) currentGroup = 1;
      total += currentGroup * 1000;
      currentGroup = 0;
      foundAny = true;
      i++;
      continue;
    }

    if (w === 'milhão' || w === 'milhões' || w === 'milhao' || w === 'milhoes') {
      if (!foundAny) currentGroup = 1;
      total += currentGroup * 1000000;
      currentGroup = 0;
      foundAny = true;
      i++;
      continue;
    }

    break;
  }

  total += currentGroup;

  if (foundAny) {
    return { value: total, consumed: i - start };
  }
  return null;
}

function tryParsePunctuation(tokens, start) {
  for (const phrase of PUNCT_PHRASES) {
    let match = true;
    if (start + phrase.words.length <= tokens.length) {
      for (let k = 0; k < phrase.words.length; k++) {
        const w = tokens[start + k].toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');
        if (w !== phrase.words[k]) {
          match = false;
          break;
        }
      }
      if (match) {
        return { text: phrase.symbol, consumed: phrase.words.length };
      }
    }
  }
  return null;
}

function tryParseDecimal(tokens, start) {
  const leftNum = tryParseNumber(tokens, start);
  if (!leftNum) return null;

  const commaIndex = start + leftNum.consumed;
  if (commaIndex < tokens.length) {
    const commaWord = tokens[commaIndex].toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');
    if (commaWord === 'vírgula' || commaWord === 'virgula') {
      let rightIdx = commaIndex + 1;
      let rightDigits = '';
      let consumedRight = 0;

      const rightNum = tryParseNumber(tokens, rightIdx);
      if (rightNum) {
        rightDigits = String(rightNum.value);
        consumedRight = rightNum.consumed;
      } else {
        while (rightIdx < tokens.length) {
          const w = tokens[rightIdx].toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');
          if (UNITS[w] !== undefined) {
            rightDigits += UNITS[w];
            rightIdx++;
            consumedRight++;
          } else if (!isNaN(parseInt(w, 10))) {
            rightDigits += parseInt(w, 10);
            rightIdx++;
            consumedRight++;
          } else {
            break;
          }
        }
      }

      if (consumedRight > 0) {
        return {
          text: `${leftNum.value},${rightDigits}`,
          consumed: leftNum.consumed + 1 + consumedRight
        };
      }
    }
  }
  return null;
}

function tryParsePercent(tokens, start) {
  let numRes = tryParseDecimal(tokens, start);
  if (!numRes) {
    numRes = tryParseNumber(tokens, start);
  }

  if (numRes) {
    const nextIdx = start + numRes.consumed;
    if (nextIdx < tokens.length) {
      const w1 = tokens[nextIdx].toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');
      if (w1 === 'porcento' || w1 === 'porcentos') {
        return { text: `${numRes.text || numRes.value}%`, consumed: numRes.consumed + 1 };
      }
      if (w1 === 'por' && nextIdx + 1 < tokens.length) {
        const w2 = tokens[nextIdx + 1].toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');
        if (w2 === 'cento' || w2 === 'centos') {
          return { text: `${numRes.text || numRes.value}%`, consumed: numRes.consumed + 2 };
        }
      }
    }
  }
  return null;
}

function tryParseDate(tokens, start) {
  const dayNum = tryParseNumber(tokens, start);
  if (!dayNum) return null;

  const sep1Idx = start + dayNum.consumed;
  if (sep1Idx < tokens.length) {
    const sep1 = tokens[sep1Idx].toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');
    if (sep1 === 'de' || sep1 === 'do' || sep1 === 'da') {
      let monthVal = null;
      let consumedMonth = 0;

      const monthWordIdx = sep1Idx + 1;
      if (monthWordIdx < tokens.length) {
        const mw = tokens[monthWordIdx].toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');
        if (MONTHS[mw] !== undefined) {
          monthVal = MONTHS[mw];
          consumedMonth = 1;
        } else {
          const monthNum = tryParseNumber(tokens, monthWordIdx);
          if (monthNum) {
            monthVal = monthNum.value;
            consumedMonth = monthNum.consumed;
          }
        }
      }

      if (monthVal !== null && monthVal >= 1 && monthVal <= 12) {
        const sep2Idx = sep1Idx + 1 + consumedMonth;
        if (sep2Idx < tokens.length) {
          const sep2 = tokens[sep2Idx].toLowerCase().replace(/[^a-záéíóúçâêôãõ]/g, '');
          if (sep2 === 'de') {
            const yearIdx = sep2Idx + 1;
            const yearNum = tryParseNumber(tokens, yearIdx);
            if (yearNum) {
              const dayStr = String(dayNum.value).padStart(2, '0');
              const monthStr = String(monthVal).padStart(2, '0');
              const yearStr = String(yearNum.value).padStart(4, '0');
              return {
                text: `${dayStr}/${monthStr}/${yearStr}`,
                consumed: dayNum.consumed + 1 + consumedMonth + 1 + yearNum.consumed
              };
            }
          }
        }
      }
    }
  }
  return null;
}

function processTranscriptText(text) {
  const rawTokens = text.split(/\s+/);
  const result = [];
  let i = 0;

  while (i < rawTokens.length) {
    const dateRes = tryParseDate(rawTokens, i);
    if (dateRes) {
      result.push(dateRes.text);
      i += dateRes.consumed;
      continue;
    }

    const percentRes = tryParsePercent(rawTokens, i);
    if (percentRes) {
      result.push(percentRes.text);
      i += percentRes.consumed;
      continue;
    }

    const decimalRes = tryParseDecimal(rawTokens, i);
    if (decimalRes) {
      result.push(decimalRes.text);
      i += decimalRes.consumed;
      continue;
    }

    const punctRes = tryParsePunctuation(rawTokens, i);
    if (punctRes) {
      result.push(punctRes.text);
      i += punctRes.consumed;
      continue;
    }

    const numberRes = tryParseNumber(rawTokens, i);
    if (numberRes) {
      result.push(String(numberRes.value));
      i += numberRes.consumed;
      continue;
    }

    result.push(rawTokens[i]);
    i++;
  }

  let joinedText = result.join(' ');
  // Corrige o espaçamento de pontuações que devem ficar unidas ao caractere anterior
  joinedText = joinedText.replace(/\s+([.,!?:;)])/g, '$1');
  joinedText = joinedText.replace(/(\()\s+/g, '$1');
  return joinedText;
}

function processFinalSpokenText(rawText, insertPos) {
  // Se a pontuação automática estiver DESATIVADA (checkbox desmarcado),
  // rodamos nosso interpretador manual para converter "dois pontos" em ":", "vírgula" em ",", etc.
  if (!autoPunct.checked) {
    return {
      text: processTranscriptText(rawText),
      consumedTokens: rawText.split(/\s+/).length
    };
  }
  
  // Se a pontuação automática estiver ATIVADA (checkbox marcado),
  // mantemos o texto cru retornado pelo navegador, permitindo que as regras padrão do sistema funcionem.
  return {
    text: rawText,
    consumedTokens: rawText.split(/\s+/).length
  };
}

/* ====== Capitalização inteligente (corrigida) ====== */
function shouldCapitalizeAtPosition(insertPos){
  const text = output.value;
  if(insertPos <= 0) return true;
  const prevChar = text.charAt(insertPos - 1);
  if(/\r|\n/.test(prevChar)) return true;
  if(/[.!?]/.test(prevChar)) return true;
  return false;
}

function applyCapitalizationRules(finalText, insertPos){
  if(!finalText) return finalText;
  if(allCaps.checked) return finalText.toUpperCase();

  if(!autoPunct.checked){
    const cap = shouldCapitalizeAtPosition(insertPos);
    if(cap) return finalText.charAt(0).toUpperCase() + finalText.slice(1);
    return finalText.charAt(0).toLowerCase() + finalText.slice(1);
  } else {
    const text = output.value;
    const prevChar = insertPos > 0 ? text.charAt(insertPos - 1) : '';
    if(/[.!?]/.test(prevChar) || /\r|\n/.test(prevChar) || insertPos === 0){
      return finalText.charAt(0).toUpperCase() + finalText.slice(1);
    } else if(prevChar){
      return finalText.charAt(0).toLowerCase() + finalText.slice(1);
    }
    return finalText;
  }
}

/* ====== Inserção no cursor (garante espaço após pontuação) ====== */
function insertAtCursor(textToInsert){
  const start = output.selectionStart;
  const end = output.selectionEnd;
  const before = output.value.slice(0, start);
  const after = output.value.slice(end);

  const prevChar = before.slice(-1);
  const nextChar = output.value.charAt(start) || '';

  // Gerenciamento inteligente de espaço à esquerda (evita palavras grudadas ou espaços duplos ao retomar fala)
  if (before.length > 0 && !/\s/.test(prevChar)) {
    const isPunctuation = /^[.,!?:;)]/.test(textToInsert);
    const isPrevOpening = /^[([{“‘]/.test(prevChar);
    if (!isPunctuation && !isPrevOpening && textToInsert.charAt(0) !== ' ') {
      textToInsert = ' ' + textToInsert;
    }
  }

  // Gerenciamento inteligente de espaço à direita se inserido no meio de um texto
  const lastCharOfInsert = textToInsert.slice(-1);
  if (after.length > 0 && !/\s/.test(nextChar)) {
    const nextCharIsPunct = /^[.,!?:;)]/.test(nextChar);
    if (!nextCharIsPunct && !/\s/.test(lastCharOfInsert)) {
      textToInsert = textToInsert + ' ';
    }
  }

  const newValue = before + textToInsert + after;
  output.value = newValue;
  const newPos = before.length + textToInsert.length;
  output.setSelectionRange(newPos, newPos);
  output.focus();
}

/* ====== SpeechRecognition e integração com parser ====== */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let recognizing = false;

// Função auxiliar para aplicar as propriedades de pontuação corretas no motor de reconhecimento
function applyEnginePunctuationConfig() {
  if (!recognition) return;
  
  // Propriedade oficial padrão para controle de pontuação automática implícita (Chrome 151+ e Edge modernos)
  if ('unspokenPunctuation' in recognition) {
    recognition.unspokenPunctuation = autoPunct.checked;
  }
  
  // Atributo legado/experimental adotado por algumas implementações de browsers
  try {
    recognition.punctuation = autoPunct.checked ? 'auto' : 'none';
  } catch(e) {}
}

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = 'pt-BR';
  recognition.interimResults = true;
  recognition.continuous = true;

  // Aplica a configuração inicial
  applyEnginePunctuationConfig();

  recognition.onstart = () => {
    recognizing = true;
    micBtn.textContent = '⏹ Parar (Esc)';
    status.textContent = 'Gravando...';
    showOverlay('', true);
    lastInterim = '';

    // Garante que o motor de reconhecimento utilize o estado atualizado do checkbox ao começar
    applyEnginePunctuationConfig();
  };

  recognition.onresult = (e) => {
    let interim = '';
    let final = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) final += t;
      else interim += t;
    }

    if(interim && interim.trim()){
      lastInterim = interim.trim();
      showOverlay(lastInterim, true);
      requestAnimationFrame(()=> { overlayText.scrollLeft = overlayText.scrollWidth; });
    } else {
      lastInterim = '';
      showOverlay('', true);
    }

    if(final && final.trim()){
      let finalTextRaw = final.trim();

      const insertPos = (typeof output.selectionStart === 'number') ? output.selectionStart : output.value.length;

      // processa tokens e retorna texto convertido
      const processed = processFinalSpokenText(finalTextRaw, insertPos);
      let finalText = processed.text;

      // Fallback para navegadores (como versões antigas do Chrome) que não realizam
      // pontuação automática nativa: se a pontuação automática estiver ativada e o texto
      // processado não contiver nenhuma pontuação final, adiciona um ponto final (.) ao término do trecho.
      if (autoPunct.checked && !/[.!?,,;:]$/.test(finalText)) {
        finalText = finalText + '.';
      }

      // aplicar capitalização inteligente
      finalText = applyCapitalizationRules(finalText, insertPos);

      // inserir no cursor (insertAtCursor cuida de espaços de forma inteligente)
      insertAtCursor(finalText);

      // atualizar nota atual / salvar
      if(currentNoteIndex !== null && notes[currentNoteIndex]){
        notes[currentNoteIndex].text = output.value;
        notes[currentNoteIndex].t = Date.now();
        persistNotes();
        renderNotes();
      } else {
        saveCurrentAsNote();
      }

      pushHistory(output.value);
      scheduleAutoSave();

      lastInterim = '';
      hideOverlay();
    }
    output.scrollTop = output.scrollHeight;
  };

  recognition.onerror = (ev) => {
    console.error('Speech error', ev);
    status.textContent = 'Erro no microfone';
    setTimeout(()=> status.textContent = 'Pronto', 1200);
    lastInterim = '';
    hideOverlay();
  };

  recognition.onend = () => {
    recognizing = false;
    micBtn.textContent = '🎤 Iniciar (Esc)';
    status.textContent = 'Pronto';
    lastInterim = '';
    hideOverlay();
  };
} else {
  micBtn.disabled = true;
  status.textContent = 'SpeechRecognition não suportado';
}

function toggleMic(){ if(!recognition) return; if(!recognizing){ try{ recognition.start(); }catch(e){ console.warn(e); } } else { recognition.stop(); } }

// Escuta alterações do checkbox para mudar a propriedade do motor de reconhecimento em tempo real se ativo
autoPunct.addEventListener('change', applyEnginePunctuationConfig);

/* ====== Overlay helpers ====== */
function showOverlay(text, showSpinner){
  overlayText.textContent = text || (showSpinner ? 'Gravando…' : '');
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden','false');
  overlaySpinner.style.display = showSpinner ? 'block' : 'none';
  overlayHint.style.display = (text && text.trim()) ? 'block' : 'none';
  requestAnimationFrame(()=> { overlayText.scrollLeft = overlayText.scrollWidth; });
}
function hideOverlay(){ overlay.classList.remove('open'); overlay.setAttribute('aria-hidden','true'); overlaySpinner.style.display = 'none'; overlayHint.style.display = 'none'; overlayText.textContent = ''; }

/* ====== Eventos UI ====== */
micBtn.addEventListener('click', toggleMic);
copyBtn.addEventListener('click', copyAll);
undoBtn.addEventListener('click', undo);
redoBtn.addEventListener('click', redo);
newBtn.addEventListener('click', newNote);
clearBtn.addEventListener('click', clearEditor);
notesToggle.addEventListener('click', toggleNotes);
closeNotesBtn.addEventListener('click', closeNotes);
deleteAllBtn.addEventListener('click', deleteAllNotes);

output.addEventListener('input', (e) => {
  pushHistory(output.value);
  scheduleAutoSave();
});

/* ====== Notas Panel UI Helpers ====== */
function toggleNotes(){ notesPanel.classList.toggle('open'); const isOpen=notesPanel.classList.contains('open'); notesPanel.setAttribute('aria-hidden', isOpen?'false':'true'); }
function closeNotes(){ notesPanel.classList.remove('open'); notesPanel.setAttribute('aria-hidden', 'true'); }

/* ====== Atalhos de teclado ====== */
window.addEventListener('keydown', (e) => {
  if(e.key === 'F9'){ e.preventDefault(); newNote(); return; }
  if(e.key === 'Escape'){ e.preventDefault(); toggleMic(); return; }
  if(e.key === 'F4'){ e.preventDefault(); copyAll(); return; }
  if(e.ctrlKey && (e.key === 'u' || e.key === 'U')){ e.preventDefault(); undo(); return; }
  if((e.ctrlKey && (e.key === 'y' || e.key === 'Y')) || (e.ctrlKey && e.shiftKey && (e.key === 'Z'))){ e.preventDefault(); redo(); return; }
  if(e.ctrlKey && (e.key === 'n' || e.key === 'N')){ e.preventDefault(); newNote(); return; }
  if(e.ctrlKey && (e.key === 'l' || e.key === 'L')){ e.preventDefault(); clearEditor(); return; }
  if(e.ctrlKey && (e.key === 'm' || e.key === 'M')){ e.preventDefault(); toggleNotes(); return; }
  if(e.ctrlKey && e.shiftKey && e.key === 'Delete'){ e.preventDefault(); deleteAllNotes(); return; }
});

/* ====== Inicialização ====== */
loadNotes();
pushHistory(output.value || '');
setFontSize(Number(fontRange.value || 22));

/* ====== Registrar service worker ====== */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').then(()=> { console.log('Service worker registrado.'); }).catch(err => { console.warn('Falha ao registrar service worker:', err); });
}

/* ====== Debug export ====== */
window.__ditado = { saveCurrentAsNote, notes, loadNotes, deleteAllNotes, undo, redo };
</script>
